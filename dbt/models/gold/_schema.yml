version: 2

models:
  - name: fct_transactions
    description: "The accounting ledger — one row per atomic finance event (charge, refund, dispute, payout). All amounts in USD."
    columns:
      - name: transaction_id
        description: "Stripe balance transaction ID"
        tests: [not_null, unique]
      - name: event_type
        tests:
          - not_null
          - accepted_values:
              values: ['charge', 'refund', 'dispute', 'payout', 'transfer', 'adjustment', 'payment']
      - name: amount_usd
        tests: [not_null]
      - name: created_date
        tests: [not_null]

  - name: fct_mrr_movements
    description: "MRR movements per customer + plan + month. New, Expansion, Contraction, Churn, No Change."
    columns:
      - name: mrr_key
        tests: [not_null, unique]
      - name: movement_type
        tests:
          - accepted_values:
              values: ['New', 'Expansion', 'Contraction', 'Churn', 'No Change']
      - name: mrr_usd
        tests: [not_null]

  - name: dim_customers
    description: "SCD Type 2 customer dimension — full history of billing country and attribute changes."
    columns:
      - name: customer_key
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: billing_country
        tests: [not_null]

  - name: dim_dates
    description: "Fiscal calendar dimension. Fiscal year July–June."
    columns:
      - name: date_key
        tests: [not_null, unique]
      - name: date_day
        tests: [not_null, unique]

  - name: dim_plans
    description: "Subscription plan dimension — billing cadence, pricing tier, monthly and annual price in USD."
    columns:
      - name: plan_key
        tests: [not_null, unique]
      - name: plan_id
        tests: [not_null]
      - name: billing_cadence
        tests:
          - not_null
          - accepted_values:
              values: ['Monthly', 'Quarterly', 'Semi-Annual', 'Annual', 'Weekly', 'Daily']
      - name: pricing_tier
        tests:
          - accepted_values:
              values: ['Starter', 'Growth', 'Professional', 'Enterprise']

  - name: dim_currencies
    description: "Currency reference dimension — currency name, symbol, region, and latest FX rate to USD."
    columns:
      - name: currency_key
        tests: [not_null, unique]
      - name: currency_code
        tests: [not_null, unique]
      - name: latest_usd_rate
        tests: [not_null]

  - name: dim_geography
    description: "Billing geography dimension — country, region (APAC/EMEA/Americas), sub-region, and market tier."
    columns:
      - name: geography_key
        tests: [not_null, unique]
      - name: country_code
        tests: [not_null, unique]
      - name: region
        tests:
          - accepted_values:
              values: ['Americas', 'EMEA', 'APAC', 'Other']

  - name: dim_payment_category
    description: "Payment event type reference dimension — financial classification, sign convention, revenue and cash impact flags."
    columns:
      - name: payment_category_key
        tests: [not_null, unique]
      - name: event_type
        tests: [not_null]
      - name: financial_category
        tests:
          - accepted_values:
              values: ['Revenue', 'Contra-Revenue', 'Cash Movement', 'Adjustment', 'Other']

  - name: fct_charges
    description: "Payment attempts — one row per Stripe charge. Links to dim_customers, dim_dates, dim_currencies. Cross-references fct_transactions via balance_transaction_id."
    columns:
      - name: charge_id
        tests: [not_null, unique]
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['succeeded', 'pending', 'failed', 'unknown']
      - name: amount_usd
        tests: [not_null]
      - name: created_date
        tests: [not_null]

  - name: fct_refunds
    description: "Issued refunds — one row per Stripe refund. signed_amount_usd always negative (contra-revenue). Links to fct_charges via charge_id."
    columns:
      - name: refund_id
        tests: [not_null, unique]
      - name: reason
        tests:
          - not_null
          - accepted_values:
              values: ['requested_by_customer', 'duplicate', 'fraudulent', 'expired_uncaptured_charge']
      - name: signed_amount_usd
        tests: [not_null]
      - name: created_date
        tests: [not_null]

  - name: fct_disputes
    description: "Chargebacks — one row per Stripe dispute. outcome_category (Won/Lost/In Progress) determines financial impact. loss_amount_usd only non-zero when lost."
    columns:
      - name: dispute_id
        tests: [not_null, unique]
      - name: outcome_category
        tests:
          - not_null
          - accepted_values:
              values: ['Won', 'Lost', 'Charge Refunded', 'Warning', 'In Progress', 'Unknown']
      - name: amount_usd
        tests: [not_null]
      - name: created_date
        tests: [not_null]

  - name: fct_payouts
    description: "Bank disbursements — one row per Stripe payout. transit_days measures cash-flow lag. Arrival date dimension key enables cash-flow calendar reporting."
    columns:
      - name: payout_id
        tests: [not_null, unique]
      - name: method
        tests:
          - not_null
          - accepted_values:
              values: ['standard', 'instant']
      - name: amount_usd
        tests: [not_null]
      - name: created_date
        tests: [not_null]
