name: dbt Docs

on:
  push:
    branches: [main]
    paths:
      - 'dbt/**'
      - '.github/workflows/dbt-docs.yml'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  generate-docs:
    name: Generate & publish dbt docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      DBT_PROFILES_DIR: ./dbt

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dbt
        run: pip install dbt-snowflake==1.7.0

      - name: Write dbt profiles.yml from secrets
        run: |
          cat > dbt/profiles.yml << EOF
          finance_data_platform:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: "${{ secrets.SNOWFLAKE_ACCOUNT }}"
                user: "${{ secrets.SNOWFLAKE_USER }}"
                password: "${{ secrets.SNOWFLAKE_PASSWORD }}"
                role: "${{ secrets.SNOWFLAKE_ROLE }}"
                warehouse: "${{ secrets.SNOWFLAKE_WAREHOUSE }}"
                database: "${{ secrets.SNOWFLAKE_DATABASE }}"
                schema: BRONZE
                threads: 4
                client_session_keep_alive: false
          EOF

      - name: Install dbt packages
        run: |
          cd dbt
          dbt deps

      - name: Generate dbt docs
        run: |
          cd dbt
          dbt docs generate --profiles-dir . --target prod

      - name: Move docs to publish directory
        run: |
          mkdir -p /tmp/dbt-docs
          cp dbt/target/index.html /tmp/dbt-docs/
          cp dbt/target/catalog.json /tmp/dbt-docs/
          cp dbt/target/manifest.json /tmp/dbt-docs/
          cp dbt/target/run_results.json /tmp/dbt-docs/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/dbt-docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
