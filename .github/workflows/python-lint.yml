name: Python Lint

on:
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'airflow/**'
      - '.github/workflows/python-lint.yml'

jobs:
  lint:
    name: Lint Python files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: flake8 — check for syntax errors and undefined names
        run: |
          flake8 scripts/ airflow/dags/ \
            --max-line-length=120 \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
