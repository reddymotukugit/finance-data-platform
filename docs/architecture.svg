<svg viewBox="0 0 1100 760" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="1100" height="760" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700" letter-spacing="0.5">Finance Data Platform — Architecture</text>
  <text x="550" y="58" text-anchor="middle" fill="#94a3b8" font-size="12">Azure ADLS Gen2 · Snowflake · dbt · Apache Airflow</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!--  STRIPE SOURCE                                        -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="30" y="80" width="180" height="130" rx="10" fill="#1e1035" stroke="#635BFF" stroke-width="2"/>
  <rect x="30" y="80" width="180" height="32" rx="10" fill="#635BFF"/>
  <rect x="30" y="100" width="180" height="12" fill="#635BFF"/>
  <text x="120" y="101" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">☁  Stripe API</text>
  <text x="120" y="128" text-anchor="middle" fill="#a5b4fc" font-size="10.5">Charges · Refunds</text>
  <text x="120" y="143" text-anchor="middle" fill="#a5b4fc" font-size="10.5">Disputes · Payouts</text>
  <text x="120" y="158" text-anchor="middle" fill="#a5b4fc" font-size="10.5">Invoices · Customers</text>
  <text x="120" y="173" text-anchor="middle" fill="#a5b4fc" font-size="10.5">Balance Txns · Prices</text>
  <text x="120" y="188" text-anchor="middle" fill="#a5b4fc" font-size="10.5">Products</text>
  <text x="120" y="204" text-anchor="middle" fill="#818cf8" font-size="9.5" font-style="italic">9 entities · incremental watermark</text>

  <!-- Arrow: Stripe → Python -->
  <line x1="210" y1="145" x2="255" y2="145" stroke="#635BFF" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="232" y="139" text-anchor="middle" fill="#818cf8" font-size="9">REST</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!--  PYTHON INGESTION                                     -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="255" y="100" width="170" height="90" rx="10" fill="#1c2a3a" stroke="#3776AB" stroke-width="2"/>
  <rect x="255" y="100" width="170" height="30" rx="10" fill="#3776AB"/>
  <rect x="255" y="118" width="170" height="12" fill="#3776AB"/>
  <text x="340" y="120" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🐍  Python 3.11</text>
  <text x="340" y="146" text-anchor="middle" fill="#93c5fd" font-size="10.5">stripe_to_adls.py</text>
  <text x="340" y="161" text-anchor="middle" fill="#93c5fd" font-size="10.5">REST → Parquet (Snappy)</text>
  <text x="340" y="178" text-anchor="middle" fill="#60a5fa" font-size="9.5" font-style="italic">Incremental watermark logic</text>

  <!-- Arrow: Python → ADLS -->
  <line x1="425" y1="145" x2="470" y2="145" stroke="#3776AB" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="447" y="139" text-anchor="middle" fill="#60a5fa" font-size="9">Parquet</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!--  AZURE ADLS Gen2                                      -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="470" y="80" width="175" height="130" rx="10" fill="#0c1a2e" stroke="#0078D4" stroke-width="2"/>
  <rect x="470" y="80" width="175" height="32" rx="10" fill="#0078D4"/>
  <rect x="470" y="100" width="175" height="12" fill="#0078D4"/>
  <text x="557" y="101" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">🗄  Azure ADLS Gen2</text>
  <text x="557" y="128" text-anchor="middle" fill="#7dd3fc" font-size="10.5">landing/stripe/{entity}/</text>
  <text x="557" y="143" text-anchor="middle" fill="#7dd3fc" font-size="10.5">landing/fx/rates/</text>
  <text x="557" y="158" text-anchor="middle" fill="#7dd3fc" font-size="10.5">archive/</text>
  <text x="557" y="178" text-anchor="middle" fill="#38bdf8" font-size="9.5">Parquet + Snappy</text>
  <text x="557" y="193" text-anchor="middle" fill="#38bdf8" font-size="9.5">External Stage → Snowflake</text>

  <!-- Arrow: ADLS → RAW (down) -->
  <line x1="557" y1="210" x2="557" y2="248" stroke="#0078D4" stroke-width="2" marker-end="url(#arr-blue2)"/>
  <text x="568" y="232" fill="#38bdf8" font-size="9">COPY INTO</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!--  SNOWFLAKE PIPELINE  (RAW → BRONZE → SILVER → GOLD)  -->
  <!-- ══════════════════════════════════════════════════════ -->

  <!-- RAW -->
  <rect x="380" y="248" width="355" height="70" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  <rect x="380" y="248" width="355" height="28" rx="10" fill="#334155"/>
  <rect x="380" y="264" width="355" height="12" fill="#334155"/>
  <text x="557" y="267" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">❄  Snowflake — RAW Schema</text>
  <text x="557" y="292" text-anchor="middle" fill="#94a3b8" font-size="10.5">raw_payload VARIANT · full Stripe JSON preserved</text>
  <text x="557" y="308" text-anchor="middle" fill="#64748b" font-size="9.5">COPY INTO from external stage · append-only</text>

  <!-- Arrow RAW → BRONZE -->
  <line x1="557" y1="318" x2="557" y2="352" stroke="#78350f" stroke-width="2" marker-end="url(#arr-bronze)"/>
  <text x="568" y="338" fill="#d97706" font-size="9">dbt incremental</text>

  <!-- BRONZE -->
  <rect x="380" y="352" width="355" height="80" rx="10" fill="#1c1208" stroke="#92400e" stroke-width="2"/>
  <rect x="380" y="352" width="355" height="28" rx="10" fill="#78350f"/>
  <rect x="380" y="368" width="355" height="12" fill="#78350f"/>
  <text x="557" y="371" text-anchor="middle" fill="#fef3c7" font-size="12" font-weight="700">🥉  BRONZE — 8 models</text>
  <text x="557" y="396" text-anchor="middle" fill="#fcd34d" font-size="10.5">Typed · Flattened · Validated</text>
  <text x="557" y="412" text-anchor="middle" fill="#d97706" font-size="10">brz_charges · brz_refunds · brz_disputes · brz_payouts</text>
  <text x="557" y="425" text-anchor="middle" fill="#d97706" font-size="10">brz_customers · brz_invoice_line_items · brz_balance_txns · brz_fx_rates</text>

  <!-- Arrow BRONZE → SILVER -->
  <line x1="557" y1="432" x2="557" y2="462" stroke="#475569" stroke-width="2" marker-end="url(#arr-silver)"/>
  <text x="568" y="450" fill="#94a3b8" font-size="9">dbt MERGE</text>

  <!-- SILVER -->
  <rect x="380" y="462" width="355" height="80" rx="10" fill="#0f172a" stroke="#475569" stroke-width="2"/>
  <rect x="380" y="462" width="355" height="28" rx="10" fill="#334155"/>
  <rect x="380" y="478" width="355" height="12" fill="#334155"/>
  <text x="557" y="481" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">🥈  SILVER — 7 models</text>
  <text x="557" y="506" text-anchor="middle" fill="#94a3b8" font-size="10.5">Deduped · FX-normalised (USD) · QUALIFY dedup guard</text>
  <text x="557" y="522" text-anchor="middle" fill="#64748b" font-size="10">stg_charges · stg_refunds · stg_disputes · stg_payouts</text>
  <text x="557" y="535" text-anchor="middle" fill="#64748b" font-size="10">stg_invoice_line_items · stg_finance_ledger_events · stg_customers_history</text>

  <!-- Arrow SILVER → GOLD -->
  <line x1="557" y1="542" x2="557" y2="572" stroke="#854d0e" stroke-width="2" marker-end="url(#arr-gold)"/>
  <text x="568" y="560" fill="#eab308" font-size="9">dbt MERGE</text>

  <!-- GOLD -->
  <rect x="380" y="572" width="355" height="90" rx="10" fill="#1a1100" stroke="#ca8a04" stroke-width="2"/>
  <rect x="380" y="572" width="355" height="28" rx="10" fill="#854d0e"/>
  <rect x="380" y="588" width="355" height="12" fill="#854d0e"/>
  <text x="557" y="591" text-anchor="middle" fill="#fef08a" font-size="12" font-weight="700">🥇  GOLD — 12 models · 6 Facts + 6 Dims</text>
  <text x="557" y="617" text-anchor="middle" fill="#fde68a" font-size="10">fct_transactions · fct_charges · fct_refunds · fct_disputes</text>
  <text x="557" y="631" text-anchor="middle" fill="#fde68a" font-size="10">fct_payouts · fct_mrr_movements</text>
  <text x="557" y="647" text-anchor="middle" fill="#d97706" font-size="10">dim_customers · dim_dates · dim_currencies · dim_plans</text>
  <text x="557" y="661" text-anchor="middle" fill="#d97706" font-size="10">dim_payment_category · dim_geography</text>

  <!-- Arrow GOLD → Consumers -->
  <line x1="735" y1="617" x2="865" y2="617" stroke="#ca8a04" stroke-width="2" marker-end="url(#arr-gold2)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!--  CONSUMERS                                            -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="865" y="572" width="200" height="90" rx="10" fill="#052e16" stroke="#16a34a" stroke-width="2"/>
  <rect x="865" y="572" width="200" height="28" rx="10" fill="#166534"/>
  <rect x="865" y="588" width="200" height="12" fill="#166534"/>
  <text x="965" y="591" text-anchor="middle" fill="#bbf7d0" font-size="12" font-weight="700">📊  Consumers</text>
  <text x="965" y="617" text-anchor="middle" fill="#86efac" font-size="11">Power BI</text>
  <text x="965" y="634" text-anchor="middle" fill="#86efac" font-size="11">Metabase</text>
  <text x="965" y="651" text-anchor="middle" fill="#86efac" font-size="11">SQL Analysts</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!--  AIRFLOW ORCHESTRATION                                -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="30" y="580" width="195" height="100" rx="10" fill="#0c1829" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="30" y="580" width="195" height="28" rx="10" fill="#1e3a8a"/>
  <rect x="30" y="596" width="195" height="12" fill="#1e3a8a"/>
  <text x="127" y="599" text-anchor="middle" fill="#bfdbfe" font-size="11.5" font-weight="700">⚙  Apache Airflow</text>
  <text x="127" y="623" text-anchor="middle" fill="#93c5fd" font-size="10.5">26-task DAG</text>
  <text x="127" y="638" text-anchor="middle" fill="#93c5fd" font-size="10.5">1:30 AM AEST (15:30 UTC)</text>
  <text x="127" y="653" text-anchor="middle" fill="#60a5fa" font-size="9.5">Docker Compose · LocalExecutor</text>
  <text x="127" y="668" text-anchor="middle" fill="#60a5fa" font-size="9.5">Ingest → Copy → dbt → Reconcile</text>

  <!-- Dashed arrow Airflow → Python -->
  <line x1="225" y1="630" x2="340" y2="190" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash-blue)"/>
  <text x="270" y="400" fill="#60a5fa" font-size="9" transform="rotate(-70, 270, 400)">orchestrates</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!--  TERRAFORM IaC                                        -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="865" y="248" width="200" height="110" rx="10" fill="#1a0a2e" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="865" y="248" width="200" height="28" rx="10" fill="#4c1d95"/>
  <rect x="865" y="264" width="200" height="12" fill="#4c1d95"/>
  <text x="965" y="267" text-anchor="middle" fill="#e9d5ff" font-size="11.5" font-weight="700">🏗  Terraform IaC</text>
  <text x="965" y="294" text-anchor="middle" fill="#c4b5fd" font-size="10.5">dev · test · prod</text>
  <text x="965" y="310" text-anchor="middle" fill="#c4b5fd" font-size="10.5">Azure Remote State</text>
  <text x="965" y="326" text-anchor="middle" fill="#a78bfa" font-size="9.5">Snowflake: DB · Schemas · Roles</text>
  <text x="965" y="341" text-anchor="middle" fill="#a78bfa" font-size="9.5">Azure: ADLS · Storage Account</text>
  <text x="965" y="356" text-anchor="middle" fill="#8b5cf6" font-size="9">Warehouses · RBAC · Environments</text>

  <!-- Dashed arrow Terraform → Snowflake box -->
  <line x1="865" y1="303" x2="758" y2="303" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash-purple)"/>
  <!-- Dashed arrow Terraform → ADLS -->
  <line x1="865" y1="280" x2="645" y2="145" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash-purple)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!--  GITHUB ACTIONS CI/CD                                 -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="865" y="80" width="200" height="140" rx="10" fill="#1c1008" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="865" y="80" width="200" height="28" rx="10" fill="#9a3412"/>
  <rect x="865" y="96" width="200" height="12" fill="#9a3412"/>
  <text x="965" y="99" text-anchor="middle" fill="#ffedd5" font-size="11.5" font-weight="700">🔄  GitHub Actions</text>
  <text x="965" y="124" text-anchor="middle" fill="#fb923c" font-size="10">dbt-ci.yml</text>
  <text x="965" y="140" text-anchor="middle" fill="#fdba74" font-size="9.5">Compile · Run · Test on PR</text>
  <text x="965" y="157" text-anchor="middle" fill="#fb923c" font-size="10">terraform-ci.yml</text>
  <text x="965" y="173" text-anchor="middle" fill="#fdba74" font-size="9.5">fmt · validate all 3 envs</text>
  <text x="965" y="190" text-anchor="middle" fill="#fb923c" font-size="10">python-lint.yml · dbt-docs.yml</text>
  <text x="965" y="206" text-anchor="middle" fill="#fdba74" font-size="9.5">flake8 · GitHub Pages docs</text>

  <!-- Dashed arrow GH Actions → dbt models area -->
  <line x1="865" y1="150" x2="758" y2="390" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash-orange)"/>

  <!-- ══════════════════════════════════════════════════════ -->
  <!--  LEGEND                                               -->
  <!-- ══════════════════════════════════════════════════════ -->
  <rect x="30" y="695" width="1040" height="52" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="50" y="714" fill="#94a3b8" font-size="10" font-weight="700">LEGEND:</text>
  <!-- Data flow -->
  <line x1="110" y1="710" x2="145" y2="710" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr-legend)"/>
  <text x="150" y="714" fill="#94a3b8" font-size="10">Data flow</text>
  <!-- Orchestration -->
  <line x1="220" y1="710" x2="255" y2="710" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-legend-blue)"/>
  <text x="260" y="714" fill="#94a3b8" font-size="10">Orchestration / Provisioning</text>
  <!-- Environments -->
  <text x="430" y="714" fill="#94a3b8" font-size="10" font-weight="700">ENVIRONMENTS:</text>
  <rect x="528" y="703" width="12" height="12" fill="#166534" rx="2"/>
  <text x="544" y="714" fill="#94a3b8" font-size="10">dev (X-Small · LRS)</text>
  <rect x="650" y="703" width="12" height="12" fill="#1e3a8a" rx="2"/>
  <text x="666" y="714" fill="#94a3b8" font-size="10">test (Small · LRS)</text>
  <rect x="760" y="703" width="12" height="12" fill="#7f1d1d" rx="2"/>
  <text x="776" y="714" fill="#94a3b8" font-size="10">prod (Medium · GRS)</text>
  <!-- Second row -->
  <text x="50" y="736" fill="#64748b" font-size="9.5">dbt models: 8 Bronze · 7 Silver · 12 Gold (27 total) · Airflow: 26 tasks · Schedule: 1:30 AM AEST · CI/CD: 4 GitHub Actions workflows</text>

  <!-- ══════════════════════════════════════════════════════ -->
  <!--  ARROW MARKERS                                        -->
  <!-- ══════════════════════════════════════════════════════ -->
  <defs>
    <marker id="arr-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#635BFF"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3776AB"/>
    </marker>
    <marker id="arr-blue2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#0078D4"/>
    </marker>
    <marker id="arr-bronze" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#78350f"/>
    </marker>
    <marker id="arr-silver" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arr-gold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#854d0e"/>
    </marker>
    <marker id="arr-gold2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ca8a04"/>
    </marker>
    <marker id="arr-dash-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arr-dash-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#7c3aed"/>
    </marker>
    <marker id="arr-dash-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ea580c"/>
    </marker>
    <marker id="arr-legend" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
    <marker id="arr-legend-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
  </defs>
</svg>
